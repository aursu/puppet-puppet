services:
  puppet:
    build:
      context: .
      dockerfile: tests/ubuntu/Dockerfile
      args:
        os: $U24
        codename: $U24CODE
    privileged: true
    cap_add:
      - SYS_ADMIN
    tmpfs:
      - /run
      - /tmp
    user: root
    image: "aursu/ubuntu:${U24TAG}-puppet"
  puppetdb:
    build:
      context: .
      dockerfile: tests/ubuntu/Dockerfile
      args:
        os: $U24
        codename: $U24CODE
    privileged: true
    cap_add:
      - SYS_ADMIN
    tmpfs:
      - /run
      - /tmp
    user: root
    image: "aursu/ubuntu:${U24TAG}-puppet"
